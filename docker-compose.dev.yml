services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    restart: "no"
    volumes:
      - ./server:/app/server
      - ./docker/wait-for-it.sh:/usr/local/bin/wait-for-it.sh:ro
    read_only: false
    stdin_open: true
    tty: true
    environment:
      NODE_ENV: development
      DEBUG: "express:*,mysql2:*"

  frontend:
    image: node:20-alpine
    container_name: academydbms-frontend
    profiles: ["dev"]
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./client:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - web
    networks:
      - internal
    stdin_open: true
    tty: true

volumes:
  frontend_node_modules:
    name: academydbms_frontend_node_modules

networks:
  internal:
    external: true
    name: academydbms_internal